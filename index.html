      display: flex;
      align-items: center;
      justify-content: center;
      padding: 22px 14px;
    }
    main { width: min(460px, 100%); }
    .app {
      background: var(--card);
      border: 1px solid rgba(255,255,255,.7);
      border-radius: 30px;
      box-shadow: var(--shadow);
      overflow: hidden;
      backdrop-filter: blur(10px);
    }
    header {
      padding: 26px 22px 18px;
      text-align: center;
      background: linear-gradient(180deg, rgba(255,255,255,.45), rgba(255,255,255,0));
    }
    h1 {
      margin: 0;
      font-size: 28px;
      letter-spacing: .04em;
      line-height: 1.25;
    }
    .subtitle {
      margin-top: 8px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.6;
    }
    .content { padding: 0 18px 22px; }
    .prompt {
      background: rgba(255,255,255,.74);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 16px;
      line-height: 1.75;
      font-size: 15px;
    }
    .tap-panel {
      margin-top: 16px;
      background: rgba(255,255,255,.72);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 16px;
    }
    .progress {
      display: flex;
      justify-content: space-between;
      gap: 6px;
      margin-bottom: 14px;
    }
    .dot {
      width: 100%;
      height: 8px;
      border-radius: 999px;
      background: rgba(92, 66, 41, .16);
      overflow: hidden;
    }
    .dot.on { background: linear-gradient(90deg, var(--accent), var(--accent2)); }
    button {
      width: 100%;
      border: 0;
      border-radius: 18px;
      padding: 16px 18px;
      font-size: 18px;
      font-weight: 700;
      letter-spacing: .04em;
      color: white;
      background: linear-gradient(135deg, #8b5a20, #c89242);
      box-shadow: 0 12px 24px rgba(132, 82, 24, .22);
      cursor: pointer;
      touch-action: manipulation;
    }
    button:active { transform: translateY(1px); }
    .secondary {
      margin-top: 10px;
      color: var(--accent);
      background: rgba(255,255,255,.74);
      border: 1px solid rgba(155,107,47,.25);
      box-shadow: none;
      font-size: 15px;
      padding: 12px 14px;
    }
    .line-stack {
      margin-top: 16px;
      padding: 14px;
      border-radius: 22px;
      background: rgba(247, 240, 230, .75);
      border: 1px solid var(--line);
    }
    .line-row {
      display: grid;
      grid-template-columns: 46px 1fr 70px;
      align-items: center;
      gap: 8px;
      min-height: 28px;
      color: var(--muted);
      font-size: 13px;
    }
    .yao-graphic { height: 12px; position: relative; }
    .yang, .yin {
      height: 8px;
      margin-top: 2px;
      border-radius: 999px;
      background: #4b3524;
    }
    .yin {
      background: transparent;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    .yin span {
      display: block;
      height: 8px;
      border-radius: 999px;
      background: #4b3524;
    }
    .pending {
      height: 8px;
      margin-top: 2px;
      border-radius: 999px;
      background: rgba(92,66,41,.16);
    }
    .line-label { color: #6c5948; font-weight: 600; }
    .line-kind { text-align: right; color: #8b765f; }
    .result-card {
      display: none;
      margin-top: 16px;
      background: rgba(255,255,255,.83);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 16px;
    }
    .result-card.show { display: block; }
    .result {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 118px;
      padding: 9px 14px;
      border-radius: 999px;
      font-size: 22px;
      font-weight: 800;
      letter-spacing: .04em;
      border: 1px solid rgba(0,0,0,.05);
      margin-bottom: 12px;
    }
    .yes { background: linear-gradient(135deg, #fff0b8, #d69b2b); color: #4a2e00; }
    .yeslean { background: linear-gradient(135deg, #fff7da, #f5d27a); color: #5a3b00; }
    .wait { background: linear-gradient(135deg, #e8e0d3, #b9ab99); color: #40362d; }
    .nolean { background: linear-gradient(135deg, #f3e4df, #d59c8f); color: #5a1e14; }
    .no { background: linear-gradient(135deg, #ead4cb, #b86f58); color: #4e170e; }
    .hex-title {
      font-size: 17px;
      font-weight: 800;
      line-height: 1.55;
      margin-bottom: 12px;
    }
    .adopted {
      font-size: 13px;
      color: var(--muted);
      margin-top: -6px;
      margin-bottom: 12px;
      line-height: 1.6;
    }
    .field {
      border-top: 1px solid var(--line);
      padding: 12px 0 0;
      margin-top: 12px;
    }
    .field b {
      display: block;
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 6px;
      letter-spacing: .08em;
    }
    .field div { line-height: 1.75; font-size: 15px; }
    .note {
      margin-top: 14px;
      font-size: 12px;
      color: var(--muted);
      line-height: 1.7;
    }
  </style>
</head>

<main>
  <section class="app">
    <header>
      <h1>断易YES/NO</h1>
      <div class="subtitle">第1卦〜第64卦 5段階・動爻式</div>
    </header>
    <div class="content">
      <div class="prompt">
        聞きたいことを、心の中でひとつ決めてください。<br>
        下から順に、六爻を立てます。動爻がない場合だけ、最後に読む爻を決めます。
      </div>

      <div class="tap-panel">
        <div class="progress" id="progress"></div>
        <button id="tapBtn">初爻を立てる</button>
        <button id="resetBtn" class="secondary" style="display:none;">もう一度占う</button>

        <div class="line-stack" id="lineStack"></div>
      </div>

      <div class="result-card" id="resultCard">
        <div class="result" id="resultBadge"></div>
        <div class="hex-title" id="hexTitle"></div>
        <div class="adopted" id="adoptedLine"></div>

        <div class="field"><b>原文</b><div id="original"></div></div>
        <div class="field"><b>訳意</b><div id="meaning"></div></div>
        <div class="field"><b>吉凶</b><div id="fortune"></div></div>
        <div class="field"><b>ひとこと</b><div id="memo"></div></div>
      </div>

      <div class="note">
        日常の小さな迷い用です。医療・法律・投資・契約・進路・人間関係など、重要な判断には使わないでください。
      </div>
    </div>
  </section>
</main>

  function weightedPick(items) {
    const total = items.reduce((sum, item) => sum + item.weight, 0);
    let r = Math.random() * total;
    for (const item of items) {
      r -= item.weight;
      if (r <= 0) return item;
    }
    return items[items.length - 1];
  }

  function renderProgress() {
    progress.innerHTML = "";
    for (let i = 0; i < 6; i++) {
      const d = document.createElement("div");
      d.className = "dot" + (i < lines.length ? " on" : "");
      progress.appendChild(d);
    }
  }

  function renderLineGraphic(bit) {
    if (bit === "1") return '<div class="yang"></div>';
    if (bit === "0") return '<div class="yin"><span></span><span></span></div>';
    return '<div class="pending"></div>';
  }

  function renderLines() {
    let html = "";
    for (let i = 5; i >= 0; i--) {
      const line = lines[i];
      html += `
        <div class="line-row">
          <div class="line-label">${yaoNames[i]}</div>
          <div class="yao-graphic">${line ? renderLineGraphic(line.bit) : renderLineGraphic(null)}</div>
          <div class="line-kind">${line ? line.name : "未定"}</div>
        </div>
      `;
    }
    lineStack.innerHTML = html;
  }

    return bit === "1" ? dataYaoNames[index] : yinDataYaoNames[index];
  }

    const moving = [];

    const moving = getMovingIndexes();
    if (moving.length > 0) return moving[moving.length - 1];
    return null;
  }

  function chooseSupplementalIndex() {
    return Math.floor(Math.random() * 6);
  }

  function showResult(adoptedIndex, modeText) {
    const pattern = lines.map(l => l.bit).join("");
    const yaoName = getYaoName(adoptedIndex, lines[adoptedIndex].bit);
    let item = oracleData.find(x => x.pattern === pattern && x.yao === yaoName);

    if (!item) {
      const candidates = oracleData.filter(x => x.pattern === pattern);
      item = candidates[adoptedIndex] || candidates[0] || oracleData[Math.floor(Math.random() * oracleData.length)];
    }

    resultBadge.textContent = item.result;
    resultBadge.className = "result " + item.resultType;
    hexTitle.textContent = `第${item.id}卦　${item.name}　${item.yao}`;
    adoptedLine.textContent = `採用爻：${yaoNames[adoptedIndex]}（${modeText}）`;

    original.textContent = item.original;
    meaning.textContent = item.meaning;
    fortune.textContent = item.fortune;
    memo.textContent = item.memo;

    resultCard.classList.add("show");
    tapBtn.style.display = "none";
    resetBtn.style.display = "block";
  }

  function completeSixLines() {
    const moving = getMovingIndexes();
    if (moving.length > 0) {
      const adoptedIndex = moving[moving.length - 1];
      showResult(adoptedIndex, `動爻${moving.length}本。最上位の動爻を採用`);
    } else {
      tapBtn.textContent = "読む爻を決める";
      tapBtn.dataset.mode = "supplemental";
    }
  }

  function updateButton() {
    if (lines.length < 6) tapBtn.textContent = `${yaoNames[lines.length]}を立てる`;
  }

  tapBtn.addEventListener("click", () => {
    if (tapBtn.dataset.mode === "supplemental") {
      const adoptedIndex = chooseSupplementalIndex();
      showResult(adoptedIndex, "動爻なし。追加タップで読む爻を採用");
      tapBtn.dataset.mode = "";
      return;
    }

    if (lines.length >= 6) return;
    const picked = weightedPick(yaoTypes);
    lines.push({ ...picked });
    renderProgress();
    renderLines();

    if (lines.length === 6) completeSixLines();
    else updateButton();
  });

  resetBtn.addEventListener("click", () => {
    lines = [];
    tapBtn.dataset.mode = "";
    resultCard.classList.remove("show");
    tapBtn.style.display = "block";
    resetBtn.style.display = "none";
    updateButton();
    renderProgress();
    renderLines();
  });

  renderProgress();
  renderLines();
  updateButton();
</script>
</body>
</html>
