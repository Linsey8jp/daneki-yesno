<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>断易YES/NO</title>
  <meta name="theme-color" content="#f6f1e8" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="断易YES/NO" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icon-180.png" />
  <style>
    :root {
      --bg: #f6f1e8;
      --card: rgba(255, 253, 248, 0.92);
      --ink: #2f2a25;
      --muted: #7a6f63;
      --soft: #f2ebe0;
      --accent: #6f8f72;
      --accent-dark: #4f6d52;
      --border: #ddcfbd;
      --gold: #b89455;
      --yes: #4f7f5f;
      --no: #8a5a55;
      --hold: #8a744d;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family:
        "Hiragino Mincho ProN",
        "Yu Mincho",
        "YuMincho",
        "Hiragino Sans",
        "Yu Gothic",
        serif;
      background:
        radial-gradient(circle at top left, rgba(111, 143, 114, 0.20), transparent 32%),
        radial-gradient(circle at bottom right, rgba(184, 148, 85, 0.16), transparent 34%),
        linear-gradient(135deg, #f8f3ea 0%, #ede1d1 100%);
      color: var(--ink);
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: max(18px, env(safe-area-inset-top)) 18px max(24px, env(safe-area-inset-bottom));
    }

    main {
      position: relative;
      width: 100%;
      max-width: 780px;
      background: var(--card);
      border: 1px solid rgba(221, 207, 189, 0.95);
      border-radius: 32px;
      box-shadow:
        0 24px 70px rgba(65, 49, 35, 0.16),
        inset 0 1px 0 rgba(255, 255, 255, 0.85);
      padding: clamp(26px, 5vw, 42px);
      overflow: hidden;
    }

    main::before {
      content: "";
      position: absolute;
      inset: 18px;
      border: 1px solid rgba(184, 148, 85, 0.28);
      border-radius: 24px;
      pointer-events: none;
    }

    .content {
      position: relative;
      z-index: 1;
    }

    .topline {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      margin-bottom: 18px;
    }

    .label {
      display: inline-block;
      font-size: 12px;
      letter-spacing: 0.18em;
      color: var(--accent-dark);
      text-transform: uppercase;
    }

    .coin-mark {
      display: flex;
      gap: 6px;
      color: var(--gold);
      font-size: 18px;
      letter-spacing: 0.08em;
      white-space: nowrap;
    }

    h1 {
      margin: 0 0 12px;
      font-size: clamp(30px, 5vw, 46px);
      line-height: 1.22;
      font-weight: 700;
      letter-spacing: 0.02em;
    }

    .lead {
      margin: 0 0 26px;
      color: var(--muted);
      line-height: 1.95;
      font-size: 15px;
      max-width: 650px;
    }

    .notice {
      border-left: 4px solid var(--accent);
      background: rgba(242, 235, 224, 0.88);
      padding: 13px 15px;
      margin: 0 0 24px;
      border-radius: 14px;
      color: #5f554b;
      font-size: 13px;
      line-height: 1.75;
    }

    label {
      display: block;
      font-weight: 700;
      margin-bottom: 10px;
      font-size: 15px;
    }

    textarea {
      width: 100%;
      min-height: 116px;
      resize: vertical;
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 17px;
      font-size: 16px;
      line-height: 1.75;
      background: #fffaf2;
      color: var(--ink);
      outline: none;
      box-shadow: inset 0 1px 3px rgba(65, 49, 35, 0.05);
    }

    textarea:focus {
      border-color: var(--accent);
      box-shadow:
        0 0 0 4px rgba(111, 143, 114, 0.16),
        inset 0 1px 3px rgba(65, 49, 35, 0.05);
    }

    .actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      align-items: center;
      margin-top: 18px;
    }

    button {
      border: none;
      border-radius: 999px;
      padding: 13px 25px;
      font-size: 16px;
      cursor: pointer;
      transition:
        transform 0.12s ease,
        box-shadow 0.12s ease,
        background 0.12s ease;
      font-family: inherit;
    }

    #divineButton {
      background: linear-gradient(135deg, var(--accent), var(--accent-dark));
      color: white;
      box-shadow: 0 9px 19px rgba(79, 109, 82, 0.28);
      min-width: 130px;
    }

    #divineButton:hover {
      transform: translateY(-1px);
      box-shadow: 0 12px 24px rgba(79, 109, 82, 0.30);
    }

    #resetButton {
      background: transparent;
      color: var(--muted);
      border: 1px solid var(--border);
    }

    #resetButton:hover {
      background: #f4eee5;
    }

    .result {
      margin-top: 30px;
      padding: clamp(20px, 4vw, 28px);
      border-radius: 26px;
      background:
        linear-gradient(135deg, rgba(248, 241, 231, 0.96), rgba(255, 252, 246, 0.96));
      border: 1px solid var(--border);
      display: none;
      box-shadow: 0 10px 26px rgba(65, 49, 35, 0.08);
    }

    .result.show {
      display: grid;
      grid-template-columns: 1fr 190px;
      gap: 24px;
      align-items: center;
      animation: fadeIn 0.25s ease-out;
    }

    .result-word {
      font-size: clamp(44px, 10vw, 76px);
      font-weight: 800;
      letter-spacing: 0.08em;
      margin-bottom: 8px;
      line-height: 1;
    }

    .result-word.yes {
      color: var(--yes);
    }

    .result-word.no {
      color: var(--no);
    }

    .result-word.hold {
      color: var(--hold);
      font-size: clamp(36px, 8vw, 62px);
    }

    .comment {
      font-size: 17px;
      line-height: 1.95;
      margin: 0;
    }

    .sub {
      margin-top: 16px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.75;
    }

    .hexagram-card {
      background: rgba(255, 250, 242, 0.85);
      border: 1px solid rgba(184, 148, 85, 0.35);
      border-radius: 22px;
      padding: 18px 16px;
      text-align: center;
    }

    .hexagram-title {
      color: var(--muted);
      font-size: 12px;
      letter-spacing: 0.12em;
      margin-bottom: 10px;
    }

    .hexagram-name {
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 14px;
    }

    .lines {
      display: flex;
      flex-direction: column;
      gap: 8px;
      align-items: center;
      margin-bottom: 14px;
    }

    .line {
      width: 96px;
      height: 8px;
      border-radius: 99px;
      background: var(--ink);
      position: relative;
    }

    .line.yin {
      background: transparent;
    }

    .line.yin::before,
    .line.yin::after {
      content: "";
      position: absolute;
      top: 0;
      width: 40px;
      height: 8px;
      border-radius: 99px;
      background: var(--ink);
    }

    .line.yin::before {
      left: 0;
    }

    .line.yin::after {
      right: 0;
    }

    .line.moving {
      outline: 2px solid rgba(184, 148, 85, 0.55);
      outline-offset: 3px;
    }

    .hexagram-note {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.65;
      margin: 0;
    }

    .hexagram-meta {
      margin: 10px 0 12px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.6;
    }

    .yao-list {
      margin: 12px auto 14px;
      padding: 0;
      list-style: none;
      max-width: 150px;
      text-align: left;
      color: #5f554b;
      font-size: 12px;
      line-height: 1.7;
    }

    .yao-list li {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      border-bottom: 1px dotted rgba(184, 148, 85, 0.35);
      padding: 2px 0;
    }

    .yao-moving {
      color: var(--gold);
      font-weight: 700;
    }

    footer {
      margin-top: 28px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.8;
      text-align: center;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(6px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 700px) {
      .result.show {
        grid-template-columns: 1fr;
      }

      .hexagram-card {
        max-width: 240px;
        margin: 0 auto;
      }
    }

    @media (max-width: 520px) {
      body {
        padding: max(12px, env(safe-area-inset-top)) 12px max(18px, env(safe-area-inset-bottom));
      }

      main {
        border-radius: 24px;
      }

      main::before {
        inset: 12px;
        border-radius: 18px;
      }

      .topline {
        align-items: flex-start;
      }

      .coin-mark {
        font-size: 15px;
      }

      button {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <main>
    <div class="content">
      <div class="topline">
        <span class="label">AI × YES / NO</span>
        <span class="coin-mark" aria-hidden="true">⚊ ⚋ ⚊</span>
      </div>

      <h1>断易YES/NO</h1>
      <p class="lead">
        人生を預けるためではなく、日常の小さな迷いを少しだけ軽くするための道具です。
        質問を入れて、偶然から返ってくるひと押しを眺めてみてください。
      </p>

      <p class="notice">
        ※これは本格的な断易ではなく、断易風のYES/NOおみくじです。医療・法律・金銭・進路・契約・人間関係など、重大な判断には使わないでください。
      </p>

      <label for="question">いま迷っていること</label>
      <textarea id="question" placeholder="例：今日はコーヒーではなく紅茶にする？"></textarea>

      <div class="actions">
        <button id="divineButton">占う</button>
        <button id="resetButton">もう一度考える</button>
      </div>

      <section id="result" class="result" aria-live="polite">
        <div>
          <div id="resultWord" class="result-word"></div>
          <p id="comment" class="comment"></p>
          <p id="sub" class="sub"></p>
        </div>

        <aside class="hexagram-card" aria-label="断易風の卦">
          <div class="hexagram-title">DANEKI-LIKE SIGN</div>
          <div id="hexagramName" class="hexagram-name"></div>
          <div id="hexagramMeta" class="hexagram-meta"></div>
          <div id="lines" class="lines"></div>
          <ul id="yaoList" class="yao-list"></ul>
          <p id="hexagramNote" class="hexagram-note"></p>
        </aside>
      </section>

      <footer>
        迷いを消すためではなく、迷いとの距離を少し取るために。
      </footer>
    </div>
  </main>

  <script>
    const questionInput = document.getElementById("question");
    const divineButton = document.getElementById("divineButton");
    const resetButton = document.getElementById("resetButton");
    const resultBox = document.getElementById("result");
    const resultWord = document.getElementById("resultWord");
    const comment = document.getElementById("comment");
    const sub = document.getElementById("sub");
    const hexagramName = document.getElementById("hexagramName");
    const hexagramMeta = document.getElementById("hexagramMeta");
    const lines = document.getElementById("lines");
    const yaoList = document.getElementById("yaoList");
    const hexagramNote = document.getElementById("hexagramNote");

    const results = [
      {
        word: "YES",
        type: "yes",
        weight: 4,
        comments: [
          "今日は、少し進めてみてもよさそうです。",
          "迷いながらでも、一歩だけなら悪くありません。",
          "完璧な理由がなくても、選んでみる価値はありそうです。",
          "気持ちが軽くなるなら、その方向でよいかもしれません。"
        ]
      },
      {
        word: "NO",
        type: "no",
        weight: 4,
        comments: [
          "今日は見送る、という選択も十分にありです。",
          "急がなくてよい問いかもしれません。",
          "少し距離を置くことで、見え方が変わりそうです。",
          "いったん保留に近いNO。無理に進めなくてよさそうです。"
        ]
      },
      {
        word: "保留",
        type: "hold",
        weight: 2,
        comments: [
          "答えを急がないことが、今日の答えかもしれません。",
          "もう少し材料が集まってから決めてもよさそうです。",
          "迷っている自分を責めず、少し寝かせてみましょう。",
          "今は白黒よりも、余白を残すほうが合っていそうです。"
        ]
      }
    ];

    const trigrams = {
      "111": { name: "乾", nature: "天" },
      "110": { name: "兌", nature: "沢" },
      "101": { name: "離", nature: "火" },
      "100": { name: "震", nature: "雷" },
      "011": { name: "巽", nature: "風" },
      "010": { name: "坎", nature: "水" },
      "001": { name: "艮", nature: "山" },
      "000": { name: "坤", nature: "地" }
    };

    const hexagramMap = {
      "111-111": "乾為天",
      "000-000": "坤為地",
      "100-010": "水雷屯",
      "010-001": "山水蒙",
      "111-010": "水天需",
      "010-111": "天水訟",
      "010-000": "地水師",
      "000-010": "水地比",
      "111-011": "風天小畜",
      "110-111": "天沢履",
      "111-000": "地天泰",
      "000-111": "天地否",
      "101-111": "天火同人",
      "111-101": "火天大有",
      "001-000": "地山謙",
      "000-100": "雷地豫",
      "100-110": "沢雷随",
      "011-001": "山風蠱",
      "110-000": "地沢臨",
      "000-011": "風地観",
      "100-101": "火雷噬嗑",
      "101-001": "山火賁",
      "000-001": "山地剥",
      "100-000": "地雷復",
      "100-111": "天雷无妄",
      "111-001": "山天大畜",
      "100-001": "山雷頤",
      "011-110": "沢風大過",
      "010-010": "坎為水",
      "101-101": "離為火",
      "001-110": "沢山咸",
      "011-100": "雷風恒",
      "001-111": "天山遯",
      "111-100": "雷天大壮",
      "000-101": "火地晋",
      "101-000": "地火明夷",
      "101-011": "風火家人",
      "110-101": "火沢睽",
      "001-010": "水山蹇",
      "010-100": "雷水解",
      "110-001": "山沢損",
      "100-011": "風雷益",
      "111-110": "沢天夬",
      "011-111": "天風姤",
      "000-110": "沢地萃",
      "011-000": "地風升",
      "010-110": "沢水困",
      "011-010": "水風井",
      "101-110": "沢火革",
      "011-101": "火風鼎",
      "100-100": "震為雷",
      "001-001": "艮為山",
      "001-011": "風山漸",
      "110-100": "雷沢帰妹",
      "101-100": "雷火豊",
      "001-101": "火山旅",
      "011-011": "巽為風",
      "110-110": "兌為沢",
      "010-011": "風水渙",
      "110-010": "水沢節",
      "110-011": "風沢中孚",
      "001-100": "雷山小過",
      "101-010": "水火既済",
      "010-101": "火水未済"
    };

    const hexagramNotes = [
      "卦名と六爻は表示しますが、ここでは本格占断ではなく、問いを眺めるための軽いサインとして扱います。",
      "動爻は、気持ちがまだ揺れている場所を示す、というこのアプリ内の演出です。",
      "用神・世応・月建・日辰までは読まず、日常の小さな選択用に留めています。",
      "結果よりも、結果を見た瞬間の自分の反応を少し観察してみてください。"
    ];

    function pickRandom(array) {
      return array[Math.floor(Math.random() * array.length)];
    }

    function weightedPick(items) {
      const total = items.reduce((sum, item) => sum + item.weight, 0);
      let random = Math.random() * total;

      for (const item of items) {
        random -= item.weight;
        if (random <= 0) return item;
      }

      return items[0];
    }

    function createHexagram() {
      lines.innerHTML = "";
      yaoList.innerHTML = "";

      const yaoNames = ["初爻", "二爻", "三爻", "四爻", "五爻", "上爻"];
      const yao = [];

      for (let i = 0; i < 6; i++) {
        const isYang = Math.random() < 0.5;
        const isMoving = Math.random() < 0.22;
        yao.push({ isYang, isMoving });
      }

      // 画面表示は上爻から初爻へ。卦の内部計算は初爻から上爻へ。
      for (let i = 5; i >= 0; i--) {
        const line = document.createElement("div");
        line.className = "line" + (yao[i].isYang ? "" : " yin") + (yao[i].isMoving ? " moving" : "");
        lines.appendChild(line);
      }

      for (let i = 0; i < 6; i++) {
        const item = document.createElement("li");
        const left = document.createElement("span");
        const right = document.createElement("span");

        left.textContent = yaoNames[i];
        right.textContent = (yao[i].isYang ? "陽" : "陰") + (yao[i].isMoving ? "・動" : "・静");

        if (yao[i].isMoving) {
          right.className = "yao-moving";
        }

        item.appendChild(left);
        item.appendChild(right);
        yaoList.appendChild(item);
      }

      const lowerKey = yao.slice(0, 3).map(line => line.isYang ? "1" : "0").join("");
      const upperKey = yao.slice(3, 6).map(line => line.isYang ? "1" : "0").join("");
      const lower = trigrams[lowerKey];
      const upper = trigrams[upperKey];
      const name = hexagramMap[lowerKey + "-" + upperKey] || "名のない卦";

      hexagramName.textContent = name;
      hexagramMeta.textContent = "上卦：" + upper.name + "（" + upper.nature + "）／ 下卦：" + lower.name + "（" + lower.nature + "）";
      hexagramNote.textContent = pickRandom(hexagramNotes);
    }

    function divine() {
      const question = questionInput.value.trim();

      if (!question) {
        resultBox.classList.add("show");
        resultWord.textContent = "未入力";
        resultWord.className = "result-word hold";
        comment.textContent = "まずは、迷っていることを一文で書いてみてください。";
        sub.textContent = "問いを言葉にした時点で、半分くらい占いは始まっています。";
        createHexagram();
        return;
      }

      const picked = weightedPick(results);
      const pickedComment = pickRandom(picked.comments);

      resultBox.classList.add("show");
      resultWord.textContent = picked.word;
      resultWord.className = "result-word " + picked.type;
      comment.textContent = pickedComment;
      sub.textContent = "結果を見た瞬間の自分の反応も、判断材料のひとつです。";
      createHexagram();
    }

    function reset() {
      questionInput.value = "";
      resultBox.classList.remove("show");
      resultWord.textContent = "";
      comment.textContent = "";
      sub.textContent = "";
      hexagramName.textContent = "";
      hexagramMeta.textContent = "";
      hexagramNote.textContent = "";
      lines.innerHTML = "";
      yaoList.innerHTML = "";
      questionInput.focus();
    }

    divineButton.addEventListener("click", divine);
    resetButton.addEventListener("click", reset);

    questionInput.addEventListener("keydown", function(event) {
      if ((event.ctrlKey || event.metaKey) && event.key === "Enter") {
        divine();
      }
    });
  </script>
</body>
</html>
